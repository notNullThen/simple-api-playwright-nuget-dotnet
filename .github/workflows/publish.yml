name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Build and pack
        run: dotnet pack SimpleApiPlaywright/SimpleApiPlaywright.csproj --configuration Release --output artifacts    

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1.1.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
    
      - name: NuGet push
        run: dotnet nuget push artifacts/SimpleApiPlaywright.1.0.0.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json